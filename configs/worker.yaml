node_id: local-worker
bind: 127.0.0.1:17891
base_url: http://127.0.0.1:17891
controller_url: http://127.0.0.1:17890
workdir: workdir
# database_path defaults to workdir/data/local.db; model_dir defaults to workdir/models.
models_conf_dir: configs/models.d
heartbeat_interval_sec: 5
# Set via config, env LOCAL_WORKER_REGISTRATION_TOKEN, or CLI --registration-token.
registration_token: null
runtime:
  # Release per-model reusable runtime cache after 30s idle; this does not unload the model.
  cache_idle_ttl_sec: 30
  # Unload loaded model/adapters/ORT sessions after 10 minutes idle.
  idle_ttl_sec: 600
  min_residency_sec: 0
  memory_pressure_threshold: 0.85
