id: indextts-1.5-onnx
name: IndexTTS 1.5 ONNX (experimental)
enabled: false
task_kinds:
  - tts.synthesize
adapter: index_tts
backend: ort
artifacts:
  - type: hugging_face
    repo_id: ModaLeap/indextts-1.5-onnx
    # path omitted: startup materializes to <model_dir>/indextts-1.5-onnx
    files:
      - IndexTTS_A.onnx
      - IndexTTS_B.onnx
      - IndexTTS_C.onnx
      - IndexTTS_D.onnx
      - IndexTTS_E.onnx
      - IndexTTS_F.onnx
      - bpe.model
      - manifest.json
      - manifest.yaml
runtime:
  # Root FP32 artifacts use CUDA when available and retain CPU fallback.
  provider_order: [cuda, cpu]
  max_concurrency: 1
  idle_ttl_sec: 300
resources:
  min_ram_mb: 8192
  min_vram_mb: 0
load_policy:
  lazy: true
  evictable: true
  pin: false
metadata:
  runtime: onnxruntime
  model_family: index_tts
  task: text-to-speech
  experimental: true
  precision: fp32
  artifact_layout: IndexTTS_A.onnx through IndexTTS_F.onnx plus bpe.model and manifest.yaml/json at the artifact root; FP32-only. Existing q4/ or fp16/ cache directories are ignored and no longer documented as supported runtime targets.
  mvp_status: Root FP32 A-F ORT sessions are configured for CUDA with CPU fallback. Real NVIDIA hardware execution remains unverified; q4cpu/fp16gpu paths remain withdrawn.
