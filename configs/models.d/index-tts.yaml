id: indextts-1.5-onnx
name: IndexTTS 1.5 ONNX (experimental)
enabled: false
task_kinds:
  - tts.synthesize
adapter: index_tts
backend: ort
artifacts:
  - type: hugging_face
    repo_id: ModaLeap/indextts-1.5-onnx
    # path omitted: startup materializes to <model_dir>/indextts-1.5-onnx
    files:
      - IndexTTS_A.onnx
      - IndexTTS_B.onnx
      - IndexTTS_C.onnx
      - IndexTTS_D.onnx
      - IndexTTS_E.onnx
      - IndexTTS_F.onnx
      - bpe.model
      - manifest.json
      - manifest.yaml
runtime:
  provider_order: [cpu]
  max_concurrency: 1
  idle_ttl_sec: 300
resources:
  min_ram_mb: 8192
  min_vram_mb: 0
load_policy:
  lazy: true
  evictable: true
  pin: false
metadata:
  runtime: onnxruntime
  model_family: index_tts
  task: text-to-speech
  experimental: true
  precision: cpu-fp32
  artifact_layout: IndexTTS_A.onnx through IndexTTS_F.onnx plus bpe.model and manifest.yaml/json at the artifact root; FP32-only. Existing q4/ or fp16/ cache directories are ignored and no longer documented as supported runtime targets.
  mvp_status: Adapter validates FP32 artifacts materialized from Hugging Face or an equivalent artifact root, loads root A-F ORT sessions, uses a lightweight Rust text normalizer plus bpe.model SentencePiece tokenization, and requires FP32 artifact smoke. q4cpu/fp16gpu paths have been withdrawn.
