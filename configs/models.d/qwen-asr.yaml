id: qwen3-asr-0.6b-onnx
name: Qwen3 ASR 0.6B ONNX INT4
enabled: true
task_kinds:
  - asr.transcribe
adapter: qwen_asr
backend: ort
artifacts:
  - type: hugging_face
    repo_id: andrewleech/qwen3-asr-0.6b-onnx
    revision: 4fc24a1402e74db89c4d2ef256875e71680128c4
    # path omitted: startup materializes to <model_dir>/qwen3-asr-0.6b-onnx
    files:
      - encoder.int4.onnx
      - decoder_init.int4.onnx
      - decoder_step.int4.onnx
      - decoder_weights.int4.data
      - embed_tokens.bin
      - tokenizer.json
      - config.json
      - preprocessor_config.json
      - tokenizer_config.json
      - added_tokens.json
      - vocab.json
runtime:
  # CUDA is preferred when available; CPU remains the portable fallback.
  provider_order: [cuda, cpu]
  max_concurrency: 1
  idle_ttl_sec: 300
resources:
  min_ram_mb: 4096
  min_vram_mb: 0
load_policy:
  lazy: true
  evictable: true
  pin: false
metadata:
  license: Apache-2.0
  runtime: onnxruntime
  model_family: qwen3_asr
  task: automatic-speech-recognition
  mvp_status: Real CPU ORT encoder/decoder/tokenizer path is implemented; real INT4 execution depends on ORT contrib MatMulNBits support and should be verified with the LOCAL_QWEN_ASR_MODEL_DIR-gated smoke test.
