# Docker Compose uses service DNS names instead of 127.0.0.1 between containers.
node_id: compose-worker
bind: 0.0.0.0:17891
base_url: http://worker:17891
controller_url: http://controller:17890
# Persistent runtime root for data/db/uploads; compose also passes --model-dir.
workdir: /app/workdir
# Model spec YAML config directory, not downloaded model weights/artifacts.
# Real artifacts are in /app/workdir/models via compose --model-dir.
models_conf_dir: configs/models.d
heartbeat_interval_sec: 5
registration_token: null
runtime:
  # Release per-model reusable runtime cache after 30s idle; this does not unload the model.
  cache_idle_ttl_sec: 30
  # Unload loaded model/adapters/ORT sessions after 10 minutes idle.
  idle_ttl_sec: 600
  min_residency_sec: 0
  memory_pressure_threshold: 0.85
