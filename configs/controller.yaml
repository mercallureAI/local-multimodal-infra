bind: 127.0.0.1:17890
workdir: workdir
# database_path defaults to workdir/data/local.db; model_dir defaults to workdir/models.
models_conf_dir: configs/models.d
# admin_token is reserved for follow-up auth; MVP exposes local-only endpoints.
admin_token: null
# Set via config, env LOCAL_WORKER_REGISTRATION_TOKEN, or CLI --worker-registration-token.
worker_registration_token: null
# Signed upload URLs default to http://127.0.0.1:<bind-port> when null.
public_base_url: null
# Backward-compatible alias for public_base_url.
file_upload_base_url: null
# HMAC key for signed upload URLs. If null, controller generates a random
# per-process secret; previously issued upload URLs expire on controller restart.
upload_signing_secret: null
