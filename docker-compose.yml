x-local-service: &local-service
  build:
    context: .
    dockerfile: Dockerfile
    network: host
    args:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      all_proxy: ${all_proxy:-}
      no_proxy: ${no_proxy:-}
  image: local-multimodal-infra:local
  volumes:
    # Persists runtime data/db/uploads and the explicit model artifact directory.
    - ./workdir:/app/workdir

services:
  controller:
    <<: *local-service
    environment:
      # Values are resolved by Docker Compose from the local .env file.
      LOCAL_WORKER_REGISTRATION_TOKEN: ${LOCAL_WORKER_REGISTRATION_TOKEN:?set in .env}
      LOCAL_UPLOAD_SIGNING_SECRET: ${LOCAL_UPLOAD_SIGNING_SECRET:?set in .env}
      LOCAL_ADMIN_TOKEN: ${LOCAL_ADMIN_TOKEN:?set in .env}
      LOCAL_PUBLIC_BASE_URL: ${LOCAL_PUBLIC_BASE_URL:?set in .env}
    command:
      - /usr/local/bin/controller
      - configs/docker-controller.yaml
      - --workdir
      - /app/workdir
      # Real model files/artifacts; configs/models.d only contains model spec YAML.
      - --model-dir
      - /app/workdir/models
    ports:
      - "17890:17890"

  worker:
    <<: *local-service
    environment:
      # Worker only needs the shared registration token; do not pass controller secrets.
      LOCAL_WORKER_REGISTRATION_TOKEN: ${LOCAL_WORKER_REGISTRATION_TOKEN:?set in .env}
    depends_on:
      - controller
    command:
      - /usr/local/bin/worker
      - configs/docker-worker.yaml
      - --workdir
      - /app/workdir
      # Same artifact directory as the controller; specs are read from configs/models.d.
      - --model-dir
      - /app/workdir/models
    ports:
      - "17891:17891"
